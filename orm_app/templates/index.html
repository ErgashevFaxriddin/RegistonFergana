<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jobs List</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; background-color: #f8f9fa; }
        header { text-align: center; margin-bottom: 30px; }
        h1 { color: #343a40; }
        ul { list-style-type: none; padding: 0; display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; }
        li { background-color: #fff; border: 1px solid #dee2e6; padding: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); transition: transform 0.2s; }
        li:hover { transform: translateY(-5px); box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h3 { margin: 0 0 10px 0; color: #007BFF; font-size: 1.2em; }
        p { margin: 0; color: #495057; }
        .salary { font-weight: bold; color: #28a745; margin-top: 8px; }
        @media (max-width: 600px) {
            ul { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <header>
        <h1>All Jobs</h1>
    </header>

    <main>
        <ul>
            {% for job in jobs %}
            <li>
                <a href="{% url 'job_detail' job.pk %}" style="text-decoration: none;">
                    <article>
                        <h3>{{ job.job_title }}</h3>
                        <p class="salary">Salary Range: {{ job.min_salary }} - {{ job.max_salary }}</p>
                    </article>
                </a>
            </li>
            {% endfor %}
        </ul>
    </main>

</body>
</html>
