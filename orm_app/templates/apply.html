<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <title>Ishga Ariza</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-br from-blue-50 to-indigo-100 min-h-screen flex items-center justify-center">

<div class="w-full max-w-lg bg-white shadow-2xl rounded-2xl p-8">

    <div class="text-center mb-6">
        <h1 class="text-3xl font-bold">Ishga Ariza</h1>
    </div>

    <form method="post" class="space-y-5">
        {% csrf_token %}

        {% if form.non_field_errors %}
            <div class="bg-red-100 text-red-600 p-3 rounded">
                {{ form.non_field_errors }}
            </div>
        {% endif %}

        <div>
            <label>Ism</label>
            {{ form.name }}
        </div>

        <div>
            <label>Email</label>
            {{ form.email }}
        </div>

        <div>
            <label>Telefon</label>
            {{ form.phone }}
        </div>

        <div>
            <label>Vakansiya</label>
            {{ form.job }}
        </div>

        <button type="submit"
            class="w-full bg-blue-600 text-white p-3 rounded-xl">
            Yuborish
        </button>
    </form>

    <div class="text-center mt-5">
        <a href="{% url 'home' %}" class="text-blue-600">
            ← Orqaga
        </a>
    </div>

</div>

</body>
</html>
