<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ishga Ariza | CRM</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Inter', sans-serif;
        }

        .glass {
            backdrop-filter: blur(10px);
            background: rgba(255, 255, 255, 0.7);
        }
    </style>
</head>

<body class="bg-gradient-to-br from-blue-50 via-gray-50 to-indigo-100 min-h-screen flex items-center justify-center p-6">

    <div class="w-full max-w-lg">

        <!-- Card -->
        <div class="glass border border-gray-200 rounded-2xl shadow-xl p-8 transition hover:shadow-2xl">

            <!-- Header -->
            <div class="mb-6 text-center">
                <h1 class="text-2xl font-bold text-gray-800">Ishga Ariza Berish</h1>
                <p class="text-sm text-gray-500 mt-1">Formani to‘ldiring va yuboring</p>
            </div>

            <!-- Form -->
            <form method="post" class="space-y-5">
                {% csrf_token %}

                <!-- Name -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Ism</label>
                    <input type="text" name="name"
                        class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:outline-none focus:ring-2 focus:ring-blue-400 focus:border-blue-400 transition shadow-sm hover:shadow-md"
                        placeholder="Ismingizni kiriting">
                </div>

                <!-- Email -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
                    <input type="email" name="email"
                        class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:outline-none focus:ring-2 focus:ring-blue-400 focus:border-blue-400 transition shadow-sm hover:shadow-md"
                        placeholder="example@gmail.com">
                </div>

                <!-- Submit -->
                <div class="pt-2">
                    <button type="submit"
                        class="w-full py-3 px-4 rounded-xl text-white font-semibold bg-gradient-to-r from-blue-500 to-indigo-600 hover:from-indigo-600 hover:to-blue-500 transition transform hover:scale-[1.02] active:scale-[0.98] shadow-md hover:shadow-lg">
                        Yuborish
                    </button>
                </div>
            </form>

            <!-- Back link -->
            <div class="mt-6 text-center">
                <a href="{% url 'home' %}"
                    class="text-sm text-blue-600 hover:text-blue-800 transition font-medium inline-flex items-center gap-1">
                    ← Bosh sahifaga qaytish
                </a>
            </div>

        </div>

        <!-- Footer -->
        <p class="text-center text-xs text-gray-400 mt-6">
            © 2026 CRM System
        </p>

    </div>

</body>
</html>
