{% extends 'base.html' %}

{% block title %}Customer Form{% endblock %}

{% block content %}
<div class="flex items-center justify-center min-h-[70vh]">

    <div class="w-full max-w-2xl bg-white rounded-2xl shadow-lg p-8">

        <div class="mb-8 text-center">
            <h1 class="text-3xl font-semibold text-gray-800">Customer Information</h1>
            <p class="text-gray-500 mt-2">Please fill in the details below</p>
        </div>

        <form method="POST" class="space-y-6">
            {% csrf_token %}

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm mb-1">First Name</label>
                    <input type="text" name="first_name" required class="w-full p-2 border rounded-lg">
                </div>

                <div>
                    <label class="block text-sm mb-1">Last Name</label>
                    <input type="text" name="last_name" required class="w-full p-2 border rounded-lg">
                </div>
            </div>

            <div>
                <label class="block text-sm mb-1">Email</label>
                <input type="email" name="email" required class="w-full p-2 border rounded-lg">
            </div>

            <div>
                <label class="block text-sm mb-1">Phone</label>
                <input type="text" name="phone" class="w-full p-2 border rounded-lg">
            </div>

            <div>
                <label class="block text-sm mb-1">Message</label>
                <textarea name="message" rows="5" required class="w-full p-2 border rounded-lg"></textarea>
            </div>

            <button type="submit" class="w-full bg-blue-600 text-white py-3 rounded-lg">
                Submit
            </button>
        </form>

    </div>
</div>
{% endblock %}
