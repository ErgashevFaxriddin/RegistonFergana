<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bosh sahifa | CRM Tizimi</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>

<body class="bg-gradient-to-br from-blue-50 to-gray-100 flex items-center justify-center min-h-screen">

    <div class="max-w-md w-full bg-white p-8 rounded-2xl shadow-xl border border-gray-100 text-center">

        <!-- Icon -->
        <div class="inline-flex items-center justify-center w-16 h-16 bg-blue-100 text-blue-600 rounded-full mb-6 shadow-sm">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                      d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" />
            </svg>
        </div>

        <!-- Title -->
        <h1 class="text-3xl font-bold text-gray-800 mb-2">
            Xush kelibsiz!
        </h1>

        <p class="text-gray-500 mb-8">
            CRM tizimiga xush kelibsiz. Quyidagi tugmalar orqali tizimdan foydalaning.
        </p>

        <!-- Employees button -->
        <a href="{% url 'employees' %}"
           class="inline-block w-full py-3 px-6 text-white bg-blue-600 hover:bg-blue-700 font-semibold rounded-xl transition duration-300 transform hover:-translate-y-1 shadow-md">
            Xodimlar ro'yxati
        </a>

        <!-- Apply button -->
        <a href="{% url 'apply' %}"
           class="inline-block w-full mt-4 py-3 px-6 text-white bg-green-600 hover:bg-green-700 font-semibold rounded-xl transition duration-300 transform hover:-translate-y-1 shadow-md">
            Ishga ariza berish
        </a>

        <!-- Footer -->
        <footer class="mt-8 text-sm text-gray-400">
            &copy; 2026 CRM tizimi. Barcha huquqlar himoyalangan.
        </footer>

    </div>

</body>
</html>
