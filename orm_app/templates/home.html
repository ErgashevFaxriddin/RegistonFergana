<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRM Home</title>

    <!-- Tailwind CSS (optional via CDN) -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 flex items-center justify-center min-h-screen">

    <div class="bg-white p-10 rounded-2xl shadow-lg w-full max-w-md text-center">

        <!-- Title -->
        <h1 class="text-3xl font-bold text-gray-800 mb-2">
            Xush kelibsiz!
        </h1>

        <p class="text-gray-500 mb-8">
            CRM tizimiga xush kelibsiz. Quyidagi tugmalar orqali tizimdan foydalaning.
        </p>

        <!-- Employees button -->
        <a href="{% url 'employees' %}"
           class="inline-block w-full py-3 px-6 text-white bg-blue-600 hover:bg-blue-700 font-semibold rounded-xl transition duration-300 transform hover:-translate-y-1 shadow-md">
            Xodimlar ro'yxati
        </a>

        <!-- Apply button -->
        <a href="{% url 'apply' %}"
           class="inline-block w-full mt-4 py-3 px-6 text-white bg-green-600 hover:bg-green-700 font-semibold rounded-xl transition duration-300 transform hover:-translate-y-1 shadow-md">
            Ishga ariza berish
        </a>

    </div>

</body>
</html>
